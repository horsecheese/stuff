<script>
/* WebSocket badge updater — shared across all pages */
(function(){
  function connect(){
    var ws=new WebSocket('ws://'+location.host+'/ws/downloads');
    ws.onmessage=function(e){
      var d=JSON.parse(e.data);
      var n=d.jobs.filter(function(j){return['downloading','queued','scraping','processing'].includes(j.status);}).length;
      var b=document.getElementById('dlBadge');
      if(!b)return;
      b.style.display=n?'inline':'none';
      if(n)b.textContent=n;
    };
    ws.onclose=function(){setTimeout(connect,3000);};
  }
  connect();
})();
</script>
