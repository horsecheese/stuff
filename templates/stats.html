<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ComicVault — Statistics</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#080810;--bg2:#0f0f1a;--bg3:#161625;--border:#1e1e35;--accent:#e63946;--text:#e8e8f0;--dim:#7a7a9a;--muted:#3a3a5a;--gold:#f4a261;--green:#2dc653;--sw:240px;--r:8px;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;}
  body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");background-size:200px;opacity:.35;}
  .shell{display:flex;height:100vh;}
  .sidebar{width:var(--sw);min-width:var(--sw);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:10;}
  .logo{padding:22px 20px 16px;font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--accent);border-bottom:1px solid var(--border);}
  .logo small{display:block;font-size:9px;color:var(--muted);font-family:'IBM Plex Mono',monospace;letter-spacing:2px;margin-top:2px;}
  nav{padding:12px 0;flex:1;overflow-y:auto;}
  .nav-section{padding:8px 16px 4px;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-family:'IBM Plex Mono',monospace;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;color:var(--dim);text-decoration:none;font-size:13px;font-weight:500;transition:all .15s;border-left:3px solid transparent;}
  .nav-item:hover{color:var(--text);background:rgba(255,255,255,.03);}
  .nav-item.active{color:var(--accent);border-left-color:var(--accent);background:color-mix(in srgb, var(--accent) 8%, transparent);}
  .nav-item svg{width:15px;height:15px;flex-shrink:0;}
  .nav-badge{background:var(--accent);color:#fff;font-size:9px;font-weight:700;border-radius:10px;padding:1px 5px;font-family:'IBM Plex Mono',monospace;margin-left:auto;}
  .sidebar-foot{padding:12px 20px;border-top:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .topbar{display:flex;align-items:center;gap:12px;padding:16px 28px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;}
  .topbar h1{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;}
  .content{flex:1;overflow-y:auto;padding:28px;}
  .content::-webkit-scrollbar{width:4px;}
  .content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

  .stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:32px;}
  .stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px;animation:fadeUp .35s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .stat-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
  .stat-icon.red{background:color-mix(in srgb,#e63946 12%,transparent);} .stat-icon.gold{background:rgba(244,162,97,.12);} .stat-icon.green{background:rgba(45,198,83,.12);} .stat-icon.blue{background:rgba(100,150,255,.12);} .stat-icon.purple{background:rgba(180,100,255,.12);}
  .stat-icon svg{width:18px;height:18px;}
  .stat-icon.red svg{color:#e63946;} .stat-icon.gold svg{color:var(--gold);} .stat-icon.green svg{color:var(--green);} .stat-icon.blue svg{color:#6496ff;} .stat-icon.purple svg{color:#b464ff;}
  .stat-num{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:1px;line-height:1;}
  .stat-label{font-size:11px;color:var(--dim);margin-top:4px;font-family:'IBM Plex Mono',monospace;}

  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px;}
  @media(max-width:900px){.two-col{grid-template-columns:1fr;}}
  .panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px 24px;animation:fadeUp .4s ease .1s both;}
  .section-title{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:16px;}

  .lang-list{display:flex;flex-direction:column;gap:10px;}
  .lang-row{display:flex;align-items:center;gap:10px;}
  .lang-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
  .lang-fill{height:100%;border-radius:3px;}
  .lang-label{font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--dim);min-width:28px;}
  .lang-count{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--muted);min-width:32px;text-align:right;}

  .tag-cloud{display:flex;flex-wrap:wrap;gap:6px;}
  .tag-pill{padding:4px 10px;border-radius:20px;font-size:11px;font-family:'IBM Plex Mono',monospace;background:color-mix(in srgb,var(--accent) 8%,transparent);color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 15%,transparent);cursor:pointer;transition:all .15s;text-decoration:none;}
  .tag-pill:hover{background:var(--accent);color:#fff;}
  .tag-pill.large{font-size:13px;padding:5px 13px;}
  .tag-pill.xl{font-size:15px;padding:6px 16px;}

  .mini-chart{display:flex;align-items:flex-end;gap:4px;height:80px;}
  .mini-bar{flex:1;background:var(--accent);border-radius:3px 3px 0 0;opacity:.7;min-width:8px;transition:opacity .15s;}
  .mini-bar:hover{opacity:1;}
  .empty-panel{color:var(--muted);font-size:13px;text-align:center;padding:32px 0;}

  .source-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
  .source-row:last-child{border-bottom:none;}
  .source-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
</style>
{% include '_theme_init.html' %}
</head>
<body>
<div class="shell">
  {% include '_nav.html' %}
  <div class="main">
    <div class="topbar"><h1>STATISTICS</h1></div>
    <div class="content" id="content">
      <div style="color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:13px;padding:40px;text-align:center;">Loading…</div>
    </div>
  </div>
</div>

<script>
const LANG_COLORS = { EN:'#6496ff', JP:'#e63946', ZH:'#f4a261', KO:'#b464ff', unknown:'#7a7a9a' };
const SRC_COLORS  = { nhentai:'#e63946', weebcentral:'#6496ff', local:'#2dc653' };

async function load() {
  try {
    const [statsR, tagsR, libR] = await Promise.all([
      fetch('/api/stats'), fetch('/api/tags'), fetch('/api/library')
    ]);
    if (!statsR.ok || !tagsR.ok || !libR.ok) throw new Error('API error');
    const stats   = await statsR.json();
    const tagsData = await tagsR.json();
    const lib     = await libR.json();
    render(stats, tagsData.tags || [], lib.comics || []);
  } catch(e) {
    document.getElementById('content').innerHTML =
      `<div class="empty-panel">Failed to load statistics: ${e.message}</div>`;
  }
}

function render(stats, tags, comics) {
  const totalMB  = stats.total_size_mb || 0;
  const sizeStr  = totalMB > 1024 ? `${(totalMB/1024).toFixed(1)} GB` : `${totalMB} MB`;
  const total    = stats.total_comics || 0;
  const unread   = stats.unread || 0;
  const readPct  = total > 0 ? Math.round((total - unread) / total * 100) : 0;

  // Language bars
  const langs = stats.languages || {};
  const totalLang = Object.values(langs).reduce((a,b) => a+b, 0) || 1;
  const langHTML = Object.entries(langs).sort((a,b) => b[1]-a[1]).map(([lang, count]) => {
    const pct   = Math.round(count/totalLang*100);
    const color = LANG_COLORS[lang] || '#7a7a9a';
    return `<div class="lang-row">
      <span class="lang-label" style="color:${color}">${lang}</span>
      <div class="lang-bar"><div class="lang-fill" style="width:${pct}%;background:${color}"></div></div>
      <span class="lang-count">${count}</span>
    </div>`;
  }).join('') || '<div class="empty-panel">No data yet.</div>';

  // Source breakdown
  const sources   = stats.sources || {};
  const totalSrc  = Object.values(sources).reduce((a,b)=>a+b,0)||1;
  const srcHTML   = Object.entries(sources).sort((a,b)=>b[1]-a[1]).map(([src,cnt])=>{
    const color = SRC_COLORS[src] || '#7a7a9a';
    const pct   = Math.round(cnt/totalSrc*100);
    return `<div class="source-row">
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="source-dot" style="background:${color}"></div>
        <span style="font-size:13px;text-transform:capitalize">${src}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:11px;color:var(--dim);font-family:'IBM Plex Mono',monospace">${pct}%</span>
        <span style="font-family:'IBM Plex Mono',monospace;font-size:13px">${cnt}</span>
      </div>
    </div>`;
  }).join('') || '<div class="empty-panel">No data yet.</div>';

  // Tag cloud (top 40)
  const topTags  = tags.slice(0, 40);
  const maxCount = topTags[0]?.count || 1;
  const tagCloudHTML = topTags.map(t => {
    const ratio = t.count / maxCount;
    const cls   = ratio > 0.7 ? 'xl' : ratio > 0.4 ? 'large' : '';
    return `<a href="/?tag=${encodeURIComponent(t.tag)}" class="tag-pill ${cls}">${t.tag} <span style="opacity:.5">${t.count}</span></a>`;
  }).join('') || '<div class="empty-panel">No tags yet.</div>';

  // Page count distribution chart
  const buckets    = [0,0,0,0,0,0,0,0];
  const barLabels  = ['<50','50','100','150','200','250','300','400+'];
  comics.forEach(m => {
    const p = m.page_count || 0;
    if (p < 50) buckets[0]++;
    else if (p < 100) buckets[1]++;
    else if (p < 150) buckets[2]++;
    else if (p < 200) buckets[3]++;
    else if (p < 250) buckets[4]++;
    else if (p < 300) buckets[5]++;
    else if (p < 400) buckets[6]++;
    else buckets[7]++;
  });
  const bucketMax  = Math.max(...buckets, 1);
  const chartHTML  = buckets.map((v, i) => {
    const h = Math.round((v / bucketMax) * 100);
    return `<div class="mini-bar" style="height:${Math.max(h,4)}%" title="${barLabels[i]}p: ${v} comics"></div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="stat-grid">
      <div class="stat-card" style="animation-delay:.0s">
        <div class="stat-icon red"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg></div>
        <div class="stat-num">${total}</div>
        <div class="stat-label">Total Comics</div>
      </div>
      <div class="stat-card" style="animation-delay:.05s">
        <div class="stat-icon gold"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg></div>
        <div class="stat-num">${(stats.total_pages||0).toLocaleString()}</div>
        <div class="stat-label">Total Pages</div>
      </div>
      <div class="stat-card" style="animation-delay:.1s">
        <div class="stat-icon green"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 7v10c0 2 1 3 3 3h10c2 0 3-1 3-3V7c0-2-1-3-3-3H7c-2 0-3 1-3 3z"/><path d="M9 11l3 3 3-3"/></svg></div>
        <div class="stat-num">${sizeStr}</div>
        <div class="stat-label">Storage Used</div>
      </div>
      <div class="stat-card" style="animation-delay:.15s">
        <div class="stat-icon blue"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg></div>
        <div class="stat-num">${stats.favorites||0}</div>
        <div class="stat-label">Favorites</div>
      </div>
      <div class="stat-card" style="animation-delay:.2s">
        <div class="stat-icon purple"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg></div>
        <div class="stat-num">${unread}</div>
        <div class="stat-label">Unread</div>
      </div>
      <div class="stat-card" style="animation-delay:.25s">
        <div class="stat-icon green"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
        <div class="stat-num">${readPct}%</div>
        <div class="stat-label">Read Rate</div>
      </div>
    </div>

    <div class="two-col">
      <div class="panel">
        <div class="section-title">Language Breakdown</div>
        <div class="lang-list">${langHTML}</div>
      </div>
      <div class="panel">
        <div class="section-title">Source Breakdown</div>
        ${srcHTML}
      </div>
    </div>

    <div class="two-col">
      <div class="panel">
        <div class="section-title">Page Count Distribution</div>
        <div class="mini-chart">${chartHTML}</div>
        <div style="display:flex;gap:4px;margin-top:6px;">
          ${barLabels.map(l=>`<div style="flex:1;font-size:8px;color:var(--muted);text-align:center;font-family:'IBM Plex Mono',monospace">${l}</div>`).join('')}
        </div>
      </div>
      <div class="panel">
        <div class="section-title">Top Tags</div>
        <div class="tag-cloud">${tagCloudHTML}</div>
      </div>
    </div>
  `;
}

load();
</script>
<script>
(function(){
  function _cb(){
    const ws=new WebSocket('ws://'+location.host+'/ws/downloads');
    ws.onmessage=function(e){
      const d=JSON.parse(e.data);
      const n=d.jobs.filter(j=>['downloading','queued','scraping','processing'].includes(j.status)).length;
      const b=document.getElementById('dlBadge');
      if(!b)return;
      b.style.display=n?'inline':'none';
      if(n)b.textContent=n;
    };
    ws.onclose=function(){setTimeout(_cb,3000);};
  }
  _cb();
})();
</script>
</body>
</html>
